seed_everything: 1000

trainer:
  max_epochs: 10
  accelerator: auto
  devices: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: contrastive-av
      entity: peterkirby
      log_model: true
      save_dir: output

model:
  class_path: models.transformer_classification_module.TransformerClassificationModule
  init_args:
    compile: true
    lr: 12e-5
    weight_decay: 1e-5
    beta2: 0.98
    eps: 1e-6
    lr_schedule: linear
    warmup_ratio: 0.1
    negatives_per_positive: 4
    gamma: 1
    model_config:
      model_name_or_path: answerdotai/ModernBERT-large
      use_bf16: true
      attn_implementation: flash_attention_2

data:
  batch_size: 8
  eval_batch_size: 128
  sampler: mperclass
  m: 2
  num_threads: 24
  max_length: 512
  tokenizer_parallelism: false
  prefetch_factor: 1
