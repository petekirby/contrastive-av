seed_everything: 1000

trainer:
  max_epochs: 10 # was 40
  accelerator: auto
  devices: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: contrastive-av
      entity: peterkirby
      log_model: true
      save_dir: output
# trainer:
#   accumulate_grad_batches: 4 <-- to test gradient accumulation vs Cross-Batch-Memory vs GradCache

model:
  class_path: models.transformer_contrastive_module.TransformerContrastiveModule
  init_args:
    compile: true
    lr: 2e-5
    lr_schedule: linear
    warmup_ratio: 0.1
    # microbatch_size: 256 # GradCache
    # XBM: cross_batch_memory_size: 1024
    model_config:
      model_name_or_path: huawei-noah/TinyBERT_General_4L_312D
      attn_implementation: flash_attention_2
      pooling: mean
      head_type: none
      normalize: true

    loss_dict:
      name: supcon
      loss_config:
        temperature: 0.05

data:
  batch_size: 256 # GradCache was 1024
  # XBM/gradient accumulation: batch_size: 256
  eval_batch_size: 256
  sampler: mperclass
  m: 2
  num_threads: 32
  max_length: 512
  tokenizer_parallelism: true
