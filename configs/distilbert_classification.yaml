seed_everything: 1000                                                                                                                        
                                        
trainer:                                                                                                                                   
  max_epochs: 10                                                                                                                            
  accelerator: auto
  devices: 1                                                                                                                               
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: contrastive-av
      entity: peterkirby
      log_model: true
      save_dir: output
                                            
model:                                  
  class_path: models.transformer_classification_module.TransformerClassificationModule
  init_args:                                                                                                                               
    compile: false                          
    lr: 2e-5                                                                                                                               
    head_lr_multiplier: 5.0
    weight_decay: 0.01                                                                                                                     
    lr_schedule: linear                     
    warmup_ratio: 0.1                                                                                                                      
    freeze_encoder: false                   
    model_config:                                                                                                                          
      model_name_or_path: distilbert/distilbert-base-uncased
      attn_implementation: flash_attention_2                                                                                                   
                                            
data:                                                                                                                                      
  batch_size: 64
  sampler: mperclass                                                                                                                       
  m: 2              
  num_threads: 4                                                                                                                           
  max_length: 512   